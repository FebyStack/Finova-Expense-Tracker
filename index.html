<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f7fa;
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease;
    }

    body.dark {
      background: #0d1117;
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Logo mark */
    .loader-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeInDown 0.5s ease forwards;
    }

    .loader-icon {
      width: 56px;
      height: 56px;
      background: #4f7ef8;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 24px rgba(79, 126, 248, 0.45);
      animation: pulse 1.8s ease infinite;
    }

    .loader-brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .loader-name {
      font-family: 'Merriweather', serif;
      font-size: 28px;
      font-weight: 900;
      color: #1a1d23;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    body.dark .loader-name {
      color: #e6eaf3;
    }

    .loader-tagline {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9aa0b0;
    }

    /* Progress bar */
    .loader-progress {
      width: 180px;
      height: 3px;
      background: #e2e6ef;
      border-radius: 9999px;
      overflow: hidden;
      animation: fadeIn 0.5s ease 0.3s both;
    }

    body.dark .loader-progress {
      background: #21293a;
    }

    .loader-progress-fill {
      height: 100%;
      width: 0%;
      background: #4f7ef8;
      border-radius: 9999px;
      animation: progress 1.8s ease forwards;
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0);     }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(79, 126, 248, 0.45); transform: scale(1);    }
      50%       { box-shadow: 0 8px 32px rgba(79, 126, 248, 0.65); transform: scale(1.04); }
    }

    @keyframes progress {
      0%   { width: 0%;   }
      40%  { width: 55%;  }
      70%  { width: 75%;  }
      100% { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="loader">
    <div class="loader-logo">
      <div class="loader-icon">
        <img src="assets/fivano.png" alt="Finova Logo" style="width: 24px; height: 24px; filter: invert(1);"/>
      </div>
      <div class="loader-brand">
        <span class="loader-name">Finova</span>
        <span class="loader-tagline">Expense Tracker</span>
      </div>
    </div>
    <div class="loader-progress">
      <div class="loader-progress-fill"></div>
    </div>
  </div>

  <!-- Instant dark mode — no flash -->
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }
  </script>

  <script>
    async function checkSession() {
      try {
        const resp = await fetch('api/me.php', { credentials: 'include' });
        const resData = await resp.json();
        
        if (resData.success) {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'login.html';
        }
      } catch (err) {
        window.location.href = 'login.html';
      }
    }
    checkSession();
  </script>

</body>
</html>
