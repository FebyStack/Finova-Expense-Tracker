<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finova</title>
  <style>
    /* Simple loading screen while auth state is checked */
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f7fa;
      font-family: 'Inter', sans-serif;
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .loader-icon {
      width: 48px;
      height: 48px;
      background: #4f7ef8;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      animation: pulse 1.5s ease infinite;
    }
    .loader-text {
      font-size: 14px;
      color: #9aa0b0;
      letter-spacing: 0.05em;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1);    }
      50%       { opacity: 0.7; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="loader-icon">💰</div>
    <span class="loader-text">Loading Finova</span>
  </div>

  <script type="module">
    import { auth }            from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'login.html';
      }
    });
  </script>
</body>
</html>
